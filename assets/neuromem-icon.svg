<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <radialGradient id="nm-bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#141414"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <linearGradient id="nm-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="nm-glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nm-glow-lg">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="nm-node-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="url(#nm-bg)"/>
  
  <!-- Brain silhouette outline -->
  <g filter="url(#nm-glow-lg)">
    <path d="M256 100 
             C200 100, 140 130, 120 180 
             C100 230, 100 260, 110 290 
             C90 300, 80 320, 85 350 
             C90 380, 110 400, 140 410 
             C160 420, 180 415, 200 410 
             C210 418, 230 425, 256 425 
             C282 425, 302 418, 312 410 
             C332 415, 352 420, 372 410 
             C402 400, 422 380, 427 350 
             C432 320, 422 300, 402 290 
             C412 260, 412 230, 392 180 
             C372 130, 312 100, 256 100Z" 
          fill="none" stroke="url(#nm-grad)" stroke-width="2.5" opacity="0.7"/>
  </g>
  
  <!-- Brain center divide -->
  <path d="M256 110 C256 180, 250 250, 256 320 C256 360, 256 400, 256 420" 
        fill="none" stroke="#7c3aed" stroke-width="1" opacity="0.3"/>
  
  <!-- Neural network connections -->
  <g stroke="#a855f7" stroke-width="1.2" opacity="0.4" fill="none">
    <!-- Layer connections -->
    <line x1="160" y1="180" x2="200" y2="240"/>
    <line x1="160" y1="180" x2="240" y2="220"/>
    <line x1="200" y1="160" x2="200" y2="240"/>
    <line x1="200" y1="160" x2="256" y2="200"/>
    <line x1="200" y1="240" x2="256" y2="200"/>
    <line x1="200" y1="240" x2="180" y2="320"/>
    <line x1="240" y1="220" x2="256" y2="200"/>
    <line x1="240" y1="220" x2="256" y2="300"/>
    <line x1="256" y1="200" x2="310" y2="240"/>
    <line x1="256" y1="200" x2="300" y2="160"/>
    <line x1="310" y1="240" x2="340" y2="180"/>
    <line x1="310" y1="240" x2="330" y2="320"/>
    <line x1="300" y1="160" x2="340" y2="180"/>
    <line x1="340" y1="180" x2="360" y2="240"/>
    <line x1="180" y1="320" x2="220" y2="360"/>
    <line x1="180" y1="320" x2="256" y2="300"/>
    <line x1="256" y1="300" x2="330" y2="320"/>
    <line x1="256" y1="300" x2="220" y2="360"/>
    <line x1="256" y1="300" x2="300" y2="370"/>
    <line x1="330" y1="320" x2="300" y2="370"/>
    <line x1="220" y1="360" x2="256" y2="380"/>
    <line x1="300" y1="370" x2="256" y2="380"/>
    <line x1="360" y1="240" x2="330" y2="320"/>
    <line x1="150" y1="280" x2="180" y2="320"/>
    <line x1="150" y1="280" x2="200" y2="240"/>
    <line x1="360" y1="280" x2="330" y2="320"/>
    <line x1="360" y1="280" x2="360" y2="240"/>
  </g>
  
  <!-- Extra wispy connections -->
  <g stroke="#c084fc" stroke-width="0.6" opacity="0.2" fill="none">
    <path d="M160 180 Q190 140 200 160"/>
    <path d="M340 180 Q370 150 360 240"/>
    <path d="M180 320 Q140 350 220 360"/>
    <path d="M330 320 Q370 350 300 370"/>
    <path d="M150 280 Q120 260 160 180"/>
    <path d="M360 280 Q400 260 340 180"/>
  </g>
  
  <!-- Neural nodes (bright points) -->
  <g filter="url(#nm-node-glow)">
    <!-- Primary nodes -->
    <circle cx="160" cy="180" r="6" fill="#e9d5ff" opacity="0.95"/>
    <circle cx="200" cy="160" r="5" fill="#d8b4fe" opacity="0.9"/>
    <circle cx="200" cy="240" r="7" fill="#e9d5ff" opacity="0.95"/>
    <circle cx="240" cy="220" r="4" fill="#c084fc" opacity="0.85"/>
    <circle cx="256" cy="200" r="8" fill="#ffffff" opacity="0.95"/>
    <circle cx="300" cy="160" r="5" fill="#d8b4fe" opacity="0.9"/>
    <circle cx="310" cy="240" r="7" fill="#e9d5ff" opacity="0.95"/>
    <circle cx="340" cy="180" r="6" fill="#e9d5ff" opacity="0.95"/>
    <circle cx="360" cy="240" r="5" fill="#d8b4fe" opacity="0.85"/>
    <circle cx="180" cy="320" r="6" fill="#e9d5ff" opacity="0.9"/>
    <circle cx="256" cy="300" r="7" fill="#ffffff" opacity="0.95"/>
    <circle cx="330" cy="320" r="6" fill="#e9d5ff" opacity="0.9"/>
    <circle cx="220" cy="360" r="5" fill="#d8b4fe" opacity="0.85"/>
    <circle cx="300" cy="370" r="5" fill="#d8b4fe" opacity="0.85"/>
    <circle cx="256" cy="380" r="6" fill="#e9d5ff" opacity="0.9"/>
    <circle cx="150" cy="280" r="4" fill="#c084fc" opacity="0.8"/>
    <circle cx="360" cy="280" r="4" fill="#c084fc" opacity="0.8"/>
    
    <!-- Tiny scattered accent nodes -->
    <circle cx="130" cy="210" r="2" fill="#a855f7" opacity="0.6"/>
    <circle cx="380" cy="210" r="2" fill="#a855f7" opacity="0.6"/>
    <circle cx="190" cy="140" r="2" fill="#a855f7" opacity="0.5"/>
    <circle cx="320" cy="140" r="2" fill="#a855f7" opacity="0.5"/>
    <circle cx="170" cy="380" r="2" fill="#a855f7" opacity="0.5"/>
    <circle cx="340" cy="380" r="2" fill="#a855f7" opacity="0.5"/>
  </g>
  
  <!-- Central pulse ring -->
  <circle cx="256" cy="200" r="16" fill="none" stroke="#e9d5ff" stroke-width="0.8" opacity="0.3"/>
  <circle cx="256" cy="300" r="14" fill="none" stroke="#e9d5ff" stroke-width="0.8" opacity="0.2"/>
</svg>
